name: Release

# Builds, signs, and publishes the Windows installer + updater manifest.
# Triggers on a version tag (recommended) or manual dispatch.
#
# The signing key + password are provided via GitHub Actions secrets (Settings →
# Secrets and variables → Actions) — they never live in the repo:
#   TAURI_SIGNING_PRIVATE_KEY           the updater signing private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key password
#
# The updater endpoint (tauri.conf.json) points at the public repo
# github.com/Mujtweaks/MujifyTweak. Until a release with a latest.json asset
# exists, the app's update check simply finds nothing and skips gracefully.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup .NET (for the temperature sidecar)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build self-contained LibreHardwareMonitor sidecar
        shell: pwsh
        run: |
          dotnet publish sidecar-src/LHMWrapper -c Release -r win-x64 `
            --self-contained true -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true
          Copy-Item sidecar-src/LHMWrapper/bin/Release/net8.0/win-x64/publish/LHMWrapper.exe `
            src-tauri/binaries/LHMWrapper-x86_64-pc-windows-msvc.exe -Force

      - name: Install frontend deps
        run: npm ci

      # Fail fast with a plain message if the updater signing secret is not
      # reaching the build. Without this, a missing/misnamed/mis-scoped secret
      # only surfaces as an opaque "tauri build exit 1" deep into the run.
      - name: Verify signing secrets are present
        shell: bash
        run: |
          missing=0
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is empty. Set it as a REPOSITORY secret (Settings -> Secrets and variables -> Actions), value = the full contents of the updater private key file. No updater .sig/latest.json can be produced without it."
            missing=1
          fi
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty. Set it as a REPOSITORY secret (the key's password)."
            missing=1
          fi
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "Signing secrets are present (values not printed)."

      - name: Build + sign + publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mujify Tweaks ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          # MUST stay false for auto-update to work: the updater endpoint is
          # `releases/latest/download/latest.json`, and GitHub's /releases/latest
          # EXCLUDES prereleases — so a prerelease is invisible to installed apps.
          # The "beta" status still lives in the version string + release name.
          prerelease: false
          # Emits latest.json (the updater manifest) alongside the NSIS installer.
          includeUpdaterJson: true
